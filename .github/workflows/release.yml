name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          existing_tag="$(git tag --points-at HEAD 'v*' | head -n1 || true)"
          if [[ -n "${existing_tag}" ]]; then
            echo "Current commit already has release tag: ${existing_tag}"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "tag_name=${existing_tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)"
          if [[ -z "${latest_tag}" ]]; then
            next_tag="v1.0.0"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${version}"
            major="${major:-1}"
            minor="${minor:-0}"
            patch="${patch:-0}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "tag_name=${next_tag}" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.version.outputs.should_release == 'true'
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        with:
          script: |
            const tag = process.env.TAG_NAME;
            const { owner, repo } = context.repo;
            const sha = context.sha;

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha,
            });

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: sha,
              name: tag,
              generate_release_notes: true,
            });

      - name: Release summary
        shell: bash
        run: |
          if [[ "${{ steps.version.outputs.should_release }}" == "true" ]]; then
            echo "Created release ${{ steps.version.outputs.tag_name }}"
          else
            echo "Skipped release because this commit is already tagged."
          fi
