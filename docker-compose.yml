services:
  alimpay:
    build: .
    container_name: alimpay-app
    ports:
      - "8080:80"
    volumes:
      - ./config:/var/www/html/config
      - ./data:/var/www/html/data
      - ./logs:/var/www/html/logs
      - ./qrcode:/var/www/html/qrcode
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    command: >
      sh -c "nohup php /var/www/html/container_monitor.php > /var/www/html/logs/monitor.log 2>&1 & apache2-foreground"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health.php?action=status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
