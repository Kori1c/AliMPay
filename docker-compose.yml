services:
  alimpay:
    build: .
    container_name: alimpay-app
    ports:
      - "8080:80"
    volumes:
      - ./config:/var/www/html/config
      - ./data:/var/www/html/data
      - ./logs:/var/www/html/logs
      - ./qrcode:/var/www/html/qrcode
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "php -r '$$ctx = stream_context_create([\"http\" => [\"timeout\" => 3, \"ignore_errors\" => true]]); $$body = @file_get_contents(\"http://127.0.0.1/health.php?action=status\", false, $$ctx); exit($$body === false ? 1 : 0);'"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
